  <path d="M512 302H611" stroke="#2E63D7" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowHead)"/>
  <path d="M512 485H611" stroke="#2E63D7" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowHead)"/>
  <path d="M512 672H611" stroke="#2E63D7" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowHead)"/>
  <path d="M1048 484H1130" stroke="#2E63D7" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowHead)"/>

