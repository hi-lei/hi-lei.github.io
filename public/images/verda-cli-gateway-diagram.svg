<svg width="1664" height="945" viewBox="0 0 1664 945" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">One Gateway, Three Interfaces</title>
  <desc id="desc">A polished diagram showing human terminal, AI agent, and IDE assistant workflows flowing into verda-cli, with Verda Cloud on the right and verdagostack as the foundation inside the CLI block.</desc>
  <defs>
    <linearGradient id="pageBg" x1="52" y1="48" x2="1612" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBFDFF"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="cliBg" x1="615" y1="228" x2="1062" y2="753" gradientUnits="userSpaceOnUse">
      <stop stop-color="#13284A"/>
      <stop offset="0.72" stop-color="#172E53"/>
      <stop offset="1" stop-color="#0F2442"/>
    </linearGradient>
    <linearGradient id="stackBg" x1="694" y1="586" x2="1015" y2="735" gradientUnits="userSpaceOnUse">
      <stop stop-color="#233A63"/>
      <stop offset="0.58" stop-color="#2A365C"/>
      <stop offset="1" stop-color="#A54A24"/>
    </linearGradient>
    <linearGradient id="cloudBg" x1="1143" y1="234" x2="1560" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2F6FEB"/>
      <stop offset="1" stop-color="#2048AA"/>
    </linearGradient>
    <linearGradient id="iconTile" x1="113" y1="246" x2="214" y2="347" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8F0FF"/>
      <stop offset="1" stop-color="#DBE7FF"/>
    </linearGradient>
    <linearGradient id="footerBg" x1="88" y1="802" x2="1575" y2="882" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5F9FF"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <filter id="softShadow" x="0" y="0" width="1664" height="945" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#27406B" flood-opacity="0.16"/>
    </filter>
    <filter id="panelShadow" x="0" y="0" width="1664" height="945" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="26" flood-color="#1E3A8A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowHead" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto">
      <path d="M0 0L14 8L0 16V0Z" fill="#2E63D7"/>
    </marker>
